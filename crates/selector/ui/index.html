<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wallpaper Selector</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        background: #1e1e2e;
        color: #cdd6f4;
      }
      .card { text-align: center; }
      h1 { margin: 0 0 .5rem; font-weight: 600; }
      p { margin: 0; color: #a6adc8; }
      .dot { color: #a6e3a1; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Wallpaper Selector</h1>
      <p><span class="dot">●</span> Tauri rodando no devcontainer</p>
    </div>
  </body>
</html>
