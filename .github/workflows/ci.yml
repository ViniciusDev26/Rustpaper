name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  IMAGE: ghcr.io/viniciusdev26/rustpaper-ci

# Cancela runs antigos da mesma branch/PR quando um push novo chega.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # Builda/publica a imagem de CI (docker/ci/Dockerfile: Ubuntu 24.04 + toolchain
  # Rust + deps de sistema do workspace) ANTES dos outros jobs, pra garantir que a
  # tag usada abaixo sempre reflete o Dockerfile deste commit. Se o Dockerfile não
  # mudou, o cache (type=gha) faz isso ser praticamente instantâneo.
  #
  # Tag por evento: push na main publica `:latest` (o que os outros runs de main
  # esperam encontrar); PR publica numa tag isolada `:pr-<número>`, pra rodar a
  # suíte da PR sem sobrescrever o `:latest` que a main usa.
  image:
    name: Build CI image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.tag.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - id: tag
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "image=${{ env.IMAGE }}:pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "image=${{ env.IMAGE }}:latest" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ci/Dockerfile
          push: true
          tags: ${{ steps.tag.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  fmt:
    name: Format
    needs: image
    runs-on: ubuntu-latest
    container: ${{ needs.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    needs: image
    runs-on: ubuntu-latest
    container: ${{ needs.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      # shared-key fixo: sem isso, o rust-cache usa o nome do job na chave e
      # clippy/build/test cada um recompila as deps (wgpu, webkit2gtk-sys, gtk...)
      # do zero, mesmo rodando logo em seguida um do outro na mesma imagem.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rustpaper-ci
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  build:
    name: Build
    needs: image
    runs-on: ubuntu-latest
    container: ${{ needs.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      # shared-key fixo: sem isso, o rust-cache usa o nome do job na chave e
      # clippy/build/test cada um recompila as deps (wgpu, webkit2gtk-sys, gtk...)
      # do zero, mesmo rodando logo em seguida um do outro na mesma imagem.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rustpaper-ci
      - run: cargo build --workspace --all-targets --verbose

  test:
    name: Test
    needs: [image, build]
    runs-on: ubuntu-latest
    container: ${{ needs.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      # shared-key fixo: sem isso, o rust-cache usa o nome do job na chave e
      # clippy/build/test cada um recompila as deps (wgpu, webkit2gtk-sys, gtk...)
      # do zero, mesmo rodando logo em seguida um do outro na mesma imagem.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rustpaper-ci
      - run: cargo test --workspace --verbose
