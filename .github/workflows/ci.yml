name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

# Cancela runs antigos da mesma branch/PR quando um push novo chega.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Dependências de sistema pra compilar o workspace (rustpaper-engine precisa de
  # wayland-client/xkbcommon + glslangValidator; rustpaper-selector é um app Tauri
  # e precisa dos devs do webkit2gtk/gtk). Nada disso precisa de GPU/compositor
  # rodando: wgpu (Vulkan) e o wayland-client resolvem o driver/compositor via
  # dlopen em tempo de execução, não em tempo de build.
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instala dependências de sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libwayland-dev libxkbcommon-dev glslang-tools \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instala dependências de sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libwayland-dev libxkbcommon-dev glslang-tools \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-targets --verbose

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instala dependências de sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libwayland-dev libxkbcommon-dev glslang-tools \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --verbose
